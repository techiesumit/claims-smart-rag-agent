<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day {{ day }} – Claims-Smart RAG Assignment Tracker</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 1.5rem;
      max-width: 1200px;
    }
    h1, h2 {
      margin-top: 1rem;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.4rem 0.6rem;
      vertical-align: top;
    }
    th {
      background-color: #f5f5f5;
    }
    textarea {
      width: 100%;
      min-height: 3rem;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
    }
    select, input[type="submit"] {
      font-family: inherit;
      font-size: 0.9rem;
    }
    .day-select-form {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>Claims‑Smart RAG – Day {{ day }} Assignments</h1>

  <form class="day-select-form" method="get" action="/day/{{ day }}">
    <label for="day-select"><strong>Go to Day:</strong></label>
    <select id="day-select" name="day"
            onchange="if (this.value) window.location.href = '/day/' + this.value;">
      {% for d in range(1, 73) %}
        <option value="{{ d }}" {% if d == day %}selected{% endif %}>Day {{ d }}</option>
      {% endfor %}
    </select>
  </form>

  {% if assignments %}
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Week</th>
          <th>Title</th>
          <th>Link</th>
          <th>Status</th>
          <th>Notes</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody>
        {% for a in assignments %}
          <tr>
            <td>{{ a.id }}</td>
            <td>{{ a.week }}</td>
            <td>{{ a.title }}</td>
            <td>
              {% if a.link %}
                <a href="{{ a.link }}" target="_blank" rel="noopener noreferrer">Link</a>
              {% else %}
                -
              {% endif %}
            </td>
            <td>
              <form method="post" action="/assignment/{{ a.id }}">
                <input type="hidden" name="day" value="{{ day }}">
                <select name="status">
                  {% for opt in status_options %}
                    <option value="{{ opt }}" {% if a.status == opt %}selected{% endif %}>
                      {{ opt }}
                    </option>
                  {% endfor %}
                </select>
            </td>
            <td>
                <textarea name="notes">{{ a.notes or "" }}</textarea>
            </td>
            <td>
                <input type="submit" value="Save">
              </form>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No assignments found for Day {{ day }}.</p>
  {% endif %}
</body>
</html>
